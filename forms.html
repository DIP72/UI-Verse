<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms - UIverse</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">
  <h2>UIverse</h2>

  <ul>
    <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
    <li><a href="button.html"><i class="fa-solid fa-mobile-button"></i> Buttons</a></li>
    <li><a href="navbar.html"><i class="fa-solid fa-bars"></i> Navbars</a></li>
    <li><a href="contact.html"><i class="fa-regular fa-user"></i> Contact</a></li>
    <li class="active"><a href="forms.html"><i class="fa-brands fa-wpforms"></i> Forms</a></li>
  </ul>
</aside>

<!-- ================= MAIN ================= -->
<main class="main">

  <h1 class="formsh1">Forms UI</h1>

  <div class="forms-grid">

    <!-- Login -->
    <div class="form-card">
      <h2>Login</h2>
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">

      <div class="options">
        <label><input type="checkbox"> Remember Me</label>
        <a href="#">Forgot Password?</a>
      </div>

      <button>Login</button>
    </div>

    <!-- Signup -->
    <div class="form-card">
      <h2>Signup</h2>
      <input type="text" placeholder="Full Name">
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">
      <input type="password" placeholder="Confirm Password">

      <button>Register</button>
    </div>

    <!-- Contact -->
    <div class="form-card">
      <h2>Contact</h2>
      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Your Email">
      <textarea placeholder="Your Message"></textarea>

      <button>Send Message</button>
    </div>

    <!-- More Inputs -->
    <div class="form-card">
      <h2>More Inputs</h2>

      <select>
        <option>Select Country</option>
        <option>India</option>
        <option>USA</option>
        <option>Africa</option>
        <option>Germany</option>
      </select>

      <div class="radio-group">
        <h4>Gender:</h4>
        <label><input type="radio" name="gender"> Male</label>
        <label><input type="radio" name="gender"> Female</label>
      </div>

      <div class="checkbox-group">
        <h4>Skills:</h4>
        <label><input type="checkbox"> HTML</label>
        <label><input type="checkbox"> CSS</label>
        <label><input type="checkbox"> JavaScript</label>
      </div>

      <input type="file">
      <button>Submit</button>
    </div>

  </div>

</main>

</body>
</html>
