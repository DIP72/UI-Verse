<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>UIverse — Gallery Components</title>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="gallery.css" />

</head>

<body>

  <main class="gallery-page">

    <!-- HERO -->
    <section class="gallery-hero">

      <div class="hero-badge">
        🖼️ Modern Gallery Collection
      </div>

      <h1>
        Creative
        <span>Gallery UI</span>
      </h1>

      <p>
        Beautiful image gallery layouts built using
        pure HTML & CSS.
      </p>

    </section>

    <!-- FILTERS -->
    <div class="gallery-filters">

      <button class="active">
        All
      </button>

      <button>
        Nature
      </button>

      <button>
        Workspace
      </button>

      <button>
        Technology
      </button>

      <button>
        Travel
      </button>

    </div>

    <!-- GALLERY GRID -->
    <section class="gallery-grid">

      <!-- CARD -->
      <div class="gallery-card large">

        <img
          src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
          alt="Nature"
        />

        <div class="gallery-overlay">

          <h3>Mountain View</h3>

          <p>
            Nature Photography
          </p>

        </div>

      </div>

      <!-- CARD -->
      <div class="gallery-card">

        <img
          src="https://images.unsplash.com/photo-1494526585095-c41746248156"
          alt="Workspace"
        />

        <div class="gallery-overlay">

          <h3>Workspace</h3>

          <p>
            Minimal Setup
          </p>

        </div>

      </div>

      <!-- CARD -->
      <div class="gallery-card">

        <img
          src="https://images.unsplash.com/photo-1518770660439-4636190af475"
          alt="Technology"
        />

        <div class="gallery-overlay">

          <h3>Technology</h3>

          <p>
            Future Devices
          </p>

        </div>

      </div>

      <!-- CARD -->
      <div class="gallery-card tall">

        <img
          src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
          alt="Travel"
        />

        <div class="gallery-overlay">

          <h3>Travel</h3>

          <p>
            Adventure Moments
          </p>

        </div>

      </div>

      <!-- CARD -->
      <div class="gallery-card">

        <img
          src="https://images.unsplash.com/photo-1498050108023-c5249f4df085"
          alt="Coding"
        />

        <div class="gallery-overlay">

          <h3>Developer Desk</h3>

          <p>
            Coding Workspace
          </p>

        </div>

      </div>

      <!-- CARD -->
      <div class="gallery-card">

        <img
          src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff"
          alt="Travel"
        />

        <div class="gallery-overlay">

          <h3>City Lights</h3>

          <p>
            Urban Photography
          </p>

        </div>

      </div>

    </section>

  </main>

</body>
</html>
