<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Product Page</title>
  <link rel="stylesheet" href="ecommerce.css">
</head>
<body>

  <div class="container">

    <div class="product-image">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Product">
    </div>

    <div class="product-details">
      <h1>Running Shoes</h1>

      <div class="rating">
        ★★★★☆
      </div>

      <h2>$89.99</h2>

      <p>
        Comfortable and stylish running shoes designed for everyday use and sports activities.
      </p>

      <button>Add to Cart</button>
    </div>

  </div>

  <section class="related-products">

    <h2>Related Products</h2>

    <div class="products-grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77" alt="">
        <h3>Sports Shoes</h3>
        <p>$69.99</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="">
        <h3>Casual Sneakers</h3>
        <p>$79.99</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772" alt="">
        <h3>White Sneakers</h3>
        <p>$59.99</p>
      </div>

    </div>

  </section>

</body>
</html>
