<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meditation Session UI</title>
  <link rel="stylesheet" href="medi.css">
</head>
<body>

  <div class="container">

    <div class="meditation-card">

      <h1>Meditation Session</h1>

      <p>
        Relax your mind and focus on your breathing.
      </p>

      <div class="breathing-circle">
        <span>Breathe</span>
      </div>

      <div class="timer" id="timer">
        05:00
      </div>

      <div class="controls">

        <button id="startBtn">
          Start
        </button>

        <button id="pauseBtn">
          Pause
        </button>

      </div>

      <div class="modes">

        <button>Focus</button>
        <button>Relax</button>
        <button>Sleep</button>

      </div>

    </div>

  </div>

  <script src="medi.js"></script>
</body>
</html>
