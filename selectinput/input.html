<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Select Input UI</title>
  <link rel="stylesheet" href="input.css">
</head>
<body>

  <div class="select-container">

    <div class="select-box" id="selectBox">

      <span id="selectedText">Select Option</span>

      <span class="arrow">&#9662;</span>

    </div>

    <ul class="options" id="optionsList">

      <li class="option">Frontend Developer</li>
      <li class="option">Backend Developer</li>
      <li class="option">UI/UX Designer</li>
      <li class="option">Full Stack Developer</li>

    </ul>

  </div>

  <script src="input.js"></script>
</body>
</html>
