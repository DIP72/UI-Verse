<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker UI</title>
  <link rel="stylesheet" href="pass.css">
</head>
<body>

  <div class="password-container">

    <h1>Password Strength Checker</h1>

    <div class="input-box">

      <input
        type="password"
        id="password"
        placeholder="Enter password"
      >

      <button id="toggleBtn">
        Show
      </button>

    </div>

    <div class="strength-bar">

      <div
        class="strength-fill"
        id="strengthFill"
      ></div>

    </div>

    <p id="strengthText">
      Password Strength
    </p>

  </div>

  <script src="pass.js"></script>
</body>
</html>
