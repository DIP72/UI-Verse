<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Dashboard UI</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>

  <div class="dashboard-container">

    <h1>Smart Home Dashboard</h1>

    <div class="device-grid">

      <div class="device-card">

        <h2>Living Room Light</h2>

        <p>Status: <span class="status">OFF</span></p>

        <label class="switch">

          <input type="checkbox" class="toggle-btn">

          <span class="slider"></span>

        </label>

      </div>

      <div class="device-card">

        <h2>Air Conditioner</h2>

        <p>Status: <span class="status">OFF</span></p>

        <label class="switch">

          <input type="checkbox" class="toggle-btn">

          <span class="slider"></span>

        </label>

      </div>

      <div class="device-card">

        <h2>Security Camera</h2>

        <p>Status: <span class="status">OFF</span></p>

        <label class="switch">

          <input type="checkbox" class="toggle-btn">

          <span class="slider"></span>

        </label>

      </div>

      <div class="device-card">

        <h2>Smart TV</h2>

        <p>Status: <span class="status">OFF</span></p>

        <label class="switch">

          <input type="checkbox" class="toggle-btn">

          <span class="slider"></span>

        </label>

      </div>

    </div>

  </div>

  <script src="home.js"></script>
</body>
</html>
