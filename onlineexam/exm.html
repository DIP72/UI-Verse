<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Examination Portal</title>
  <link rel="stylesheet" href="exm.css">
</head>
<body>

  <div class="exam-dashboard">

    <aside class="sidebar">

      <h2>Exam Panel</h2>

      <div class="timer-section">
        <h3>Time Left</h3>
        <p id="timer">30:00</p>
      </div>

      <div class="question-nav">

        <button class="active">1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>

      </div>

    </aside>

    <main class="exam-content">

      <div class="question-card">

        <h2>
          Q1. Which language is mainly used for web page structure?
        </h2>

        <div class="options">

          <label>
            <input type="radio" name="question">
            HTML
          </label>

          <label>
            <input type="radio" name="question">
            CSS
          </label>

          <label>
            <input type="radio" name="question">
            Python
          </label>

          <label>
            <input type="radio" name="question">
            Java
          </label>

        </div>

        <div class="buttons">

          <button class="secondary-btn">
            Previous
          </button>

          <button class="primary-btn">
            Next
          </button>

        </div>

      </div>

    </main>

  </div>

  <script src="exm.js"></script>
</body>
</html>
