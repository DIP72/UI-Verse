<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>UIverse — Charts Components</title>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="charts.css" />
</head>

<body>

  <main class="charts-page">

    <!-- HERO -->
    <section class="charts-hero">

      <div class="hero-badge">
        📊 Data Visualization Components
      </div>

      <h1>
        Modern Dashboard
        <span>Charts UI</span>
      </h1>

      <p>
        Beautiful analytics components built using
        pure HTML & CSS.
      </p>

    </section>

    <!-- CHART GRID -->
    <section class="charts-grid">

      <!-- LINE CHART -->
      <div class="chart-card">

        <div class="chart-header">
          <h3>Line Chart</h3>
          <span>Monthly Growth</span>
        </div>

        <div class="line-chart">

          <div class="line line-1"></div>

          <div class="line-points">

            <span style="height:60%"></span>
            <span style="height:90%"></span>
            <span style="height:40%"></span>
            <span style="height:80%"></span>
            <span style="height:70%"></span>

          </div>

        </div>

      </div>

      <!-- BAR CHART -->
      <div class="chart-card">

        <div class="chart-header">
          <h3>Bar Chart</h3>
          <span>Revenue Stats</span>
        </div>

        <div class="bar-chart">

          <div class="bar" style="height:60%"></div>
          <div class="bar" style="height:90%"></div>
          <div class="bar" style="height:40%"></div>
          <div class="bar" style="height:80%"></div>
          <div class="bar" style="height:70%"></div>

        </div>

      </div>

      <!-- PIE CHART -->
      <div class="chart-card">

        <div class="chart-header">
          <h3>Pie Chart</h3>
          <span>Traffic Sources</span>
        </div>

        <div class="pie-chart"></div>

      </div>

      <!-- PROGRESS -->
      <div class="chart-card">

        <div class="chart-header">
          <h3>Progress Stats</h3>
          <span>Project Completion</span>
        </div>

        <div class="progress-wrapper">

          <div class="progress-item">
            <label>UI Design</label>
            <div class="progress-bar">
              <span style="width:90%"></span>
            </div>
          </div>

          <div class="progress-item">
            <label>Development</label>
            <div class="progress-bar">
              <span style="width:75%"></span>
            </div>
          </div>

          <div class="progress-item">
            <label>Testing</label>
            <div class="progress-bar">
              <span style="width:55%"></span>
            </div>
          </div>

        </div>

      </div>

    </section>

  </main>

</body>
</html>
