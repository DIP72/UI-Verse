<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistics Dashboard UI</title>
  <link rel="stylesheet" href="board.css">
</head>
<body>

  <div class="dashboard-container">

    <h1>Statistics Dashboard</h1>

    <div class="stats-grid">

      <div class="stat-card">

        <h2 id="usersCount">0</h2>

        <p>Total Users</p>

      </div>

      <div class="stat-card">

        <h2 id="projectsCount">0</h2>

        <p>Projects Completed</p>

      </div>

      <div class="stat-card">

        <h2 id="clientsCount">0</h2>

        <p>Happy Clients</p>

      </div>

      <div class="stat-card">

        <h2 id="reviewsCount">0</h2>

        <p>Positive Reviews</p>

      </div>

    </div>

  </div>

  <script src="board.js"></script>
</body>
</html>
