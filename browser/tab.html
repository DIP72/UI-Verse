<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Tabs Manager UI</title>
  <link rel="stylesheet" href="tab.css">
</head>
<body>

  <div class="browser-container">

    <div class="tabs-header" id="tabsHeader">

      <div class="tab active">

        <span>Home</span>

        <button class="close-btn">
          ×
        </button>

      </div>

      <div class="tab">

        <span>Projects</span>

        <button class="close-btn">
          ×
        </button>

      </div>

      <div class="tab">

        <span>About</span>

        <button class="close-btn">
          ×
        </button>

      </div>

      <button id="addTabBtn">
        +
      </button>

    </div>

    <div class="browser-content">

      <h1>Browser Tabs Manager</h1>

      <p>
        Responsive browser-style tabs manager UI built using HTML, CSS, and JavaScript.
      </p>

    </div>

  </div>

  <script src="tab.js"></script>
</body>
</html>
