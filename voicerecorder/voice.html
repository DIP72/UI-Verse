<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Recorder UI</title>
  <link rel="stylesheet" href="voice.css">
</head>
<body>

  <div class="recorder-container">

    <h1>Voice Recorder</h1>

    <div class="visualizer">

      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>

    </div>

    <div class="timer" id="timer">
      00:00
    </div>

    <div class="controls">

      <button id="recordBtn">
        Record
      </button>

      <button id="stopBtn">
        Stop
      </button>

    </div>

  </div>

  <script src="voice.js"></script>
</body>
</html>
