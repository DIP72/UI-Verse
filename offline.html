<!doctype html>
<html lang="en">
  <head>

    <title>Offline — UI-Verse</title>
    <style>body{font-family:system-ui,Segoe UI,Arial;background:#f7fafc;color:#222;display:flex;align-items:center;justify-content:center;height:100vh;margin:0} .card{max-width:540px;padding:30px;border-radius:8px;background:white;box-shadow:0 6px 18px rgba(12,12,30,0.08);text-align:center} h1{margin-bottom:8px} p{color:#555}</style>

  <body>
    <div class="card">
      <h1>You're offline</h1>

      <p style="margin-top:12px;font-size:0.9em;color:#777">You can still browse cached pages.</p>
    </div>
  </body>
